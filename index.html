<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      maximum-scale=1 reduces accidental pinch/double-tap zoom that breaks the reader UI.
      Font size on form controls is kept ≥16px (see index.css) for iOS focus zoom.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <title>Kora - Next-Gen Ebook Reader</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kora" />
    <meta name="application-name" content="Kora" />
    <meta name="theme-color" content="#18181B" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F4F1EA" media="(prefers-color-scheme: light)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
