apply plugin: 'com.android.application'
// Makes google-services.json values available to Firebase SDKs
apply plugin: 'com.google.gms.google-services'

android {
    namespace = "app.kora.reader"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "app.kora.reader"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode Integer.parseInt(project.hasProperty('KORA_VERSION_CODE') ? KORA_VERSION_CODE : '1')
        versionName project.hasProperty('KORA_VERSION_NAME') ? KORA_VERSION_NAME : '1.0.0'
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        vectorDrawables.useSupportLibrary = true
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            // Prefer upload-key properties from CI secrets; fall back to committed CI keystore.
            def storePath = project.hasProperty('KORA_UPLOAD_STORE_FILE')
                ? KORA_UPLOAD_STORE_FILE
                : 'keystore/kora-ci.jks'
            def storePass = project.hasProperty('KORA_UPLOAD_STORE_PASSWORD')
                ? KORA_UPLOAD_STORE_PASSWORD
                : 'koraci-release'
            def alias = project.hasProperty('KORA_UPLOAD_KEY_ALIAS')
                ? KORA_UPLOAD_KEY_ALIAS
                : 'kora'
            def keyPass = project.hasProperty('KORA_UPLOAD_KEY_PASSWORD')
                ? KORA_UPLOAD_KEY_PASSWORD
                : 'koraci-release'
            def store = file(storePath)
            if (store.exists()) {
                storeFile store
                storePassword storePass
                keyAlias alias
                keyPassword keyPass
            }
        }
    }
    buildTypes {
        debug {
            // Keep applicationId = app.kora.reader so it matches google-services.json
            debuggable true
            minifyEnabled false
        }
        release {
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    packaging {
        resources {
            excludes += ['META-INF/DEPENDENCIES', 'META-INF/LICENSE', 'META-INF/LICENSE.txt', 'META-INF/NOTICE', 'META-INF/NOTICE.txt']
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')

    // Firebase Android BoM — keeps SDK versions aligned
    implementation platform('com.google.firebase:firebase-bom:34.16.0')
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'com.google.firebase:firebase-auth'
}

apply from: 'capacitor.build.gradle'
