name = "kora"
main = "src/worker.ts"
compatibility_date = "2024-04-03"
compatibility_flags = [ "nodejs_compat" ]
workers_dev = true

[assets]
directory = "./dist"
# Serve index.html for client routes like /share (Web Share Target).
not_found_handling = "single-page-application"
# Only API hits the Worker first; everything else is static/SPA.
run_worker_first = ["/api/*"]

[browser]
binding = "BROWSER"

# Public production Worker (deploy from `main` with deploy:prod).
[env.production]
name = "kora"
vars = { APP_CHANNEL = "production" }

# Beta sandbox Worker (deploy from `beta` with deploy:beta).
[env.beta]
name = "kora-beta"
vars = { APP_CHANNEL = "beta" }

